server:
  port: 8761

spring:
  application:
    name: eureka-server

# The Eureka server itself must NOT register with or fetch from itself
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000
  instance:
    hostname: localhost
